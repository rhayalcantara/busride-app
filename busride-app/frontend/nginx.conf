# ============================================================
# nginx del frontend BusRide (producción).
# Sirve el bundle Angular y hace de reverse proxy mismo-origen:
#   /api/       → backend:3000 (REST; el frontend usa apiUrl relativa /api/v1)
#   /socket.io/ → backend:3000 (Socket.IO /tracking, con upgrade WebSocket)
# TLS: terminar en el balanceador/proxy del host, o extender este server
# con listen 443 ssl + certificados montados.
# ============================================================
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión (el bundle inicial pasa de ~496 kB a ~127 kB)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API REST del backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO (tracking en vivo) — requiere upgrade WebSocket
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Sesiones largas: un pasajero puede seguir un viaje > 1 min sin tráfico
        proxy_read_timeout 3600s;
    }

    # Estáticos con hash en el nombre (outputHashing: all) — cache inmutable
    location ~* \.(js|css|png|jpg|svg|ico|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA: cualquier ruta de Angular cae en index.html (sin cache del shell)
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}

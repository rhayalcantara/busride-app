version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: busride_sqlserver
    environment:
      SA_PASSWORD: "BusRide@2024Secure!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - busride_net
    healthcheck:
      # La imagen 2022-latest trae mssql-tools18 (no mssql-tools); -C confía en el certificado autofirmado
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'BusRide@2024Secure!' -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # One-shot (resuelve INF-1): la imagen mssql NO ejecuta /docker-entrypoint-initdb.d,
  # así que este servicio corre database/init.sh (01→02→03, idempotente) cuando
  # sqlserver está healthy y termina. El backend espera a que complete con éxito.
  # Uso manual: docker compose up sqlserver-init  (o run --rm sqlserver-init)
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: busride_sqlserver_init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      DB_HOST: sqlserver
      SA_PASSWORD: "BusRide@2024Secure!"
    volumes:
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/init.sh:/usr/local/bin/busride-init.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/busride-init.sh"]
    restart: "no"
    networks:
      - busride_net

  redis:
    image: redis:7-alpine
    container_name: busride_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - busride_net
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: busride_backend
    environment:
      NODE_ENV: development
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: busride_db
      DB_USER: sa
      DB_PASSWORD: "BusRide@2024Secure!"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: "busride-jwt-secret-change-in-production"
      JWT_EXPIRES_IN: "24h"
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      sqlserver:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - busride_net
    volumes:
      - ./backend/src:/app/src
    command: npm run start:dev

volumes:
  sqlserver_data:
  redis_data:

networks:
  busride_net:
    driver: bridge
